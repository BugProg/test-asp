name: MicroXRCE ARM64 Clean Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # Build everything from a fresh Docker image (no repo path issues)
      # ------------------------------------------------------------
      - name: Build ARM64 image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t microxrce-arm64 \
            - <<'EOF'
          FROM ubuntu:24.04

          RUN apt update && apt install -y \
              git \
              cmake \
              build-essential

          RUN git clone https://github.com/eProsima/Micro-XRCE-DDS-Agent.git /src

          WORKDIR /src
          RUN mkdir -p build && cd build && \
              cmake .. && \
              make -j$(nproc)

          EOF

      # ------------------------------------------------------------
      # Extract binary
      # ------------------------------------------------------------
      - name: Extract binary
        run: |
          docker create --name tmp microxrce-arm64
          docker cp tmp:/src/build/MicroXRCEAgent ./MicroXRCEAgent || true
          docker rm tmp

      - name: Make executable
        run: chmod +x MicroXRCEAgent

      # ------------------------------------------------------------
      # Release
      # ------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MicroXRCEAgent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}