name: MicroXRCE ARM64 Build (Buildx)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04

    steps:
      # ------------------------------------------------------------
      # Checkout repo
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Enable QEMU (for ARM emulation)
      # ------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ------------------------------------------------------------
      # Enable Docker Buildx
      # ------------------------------------------------------------
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # Build ARM64 binary using Buildx
      # ------------------------------------------------------------
      - name: Build ARM64 MicroXRCEAgent
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Containers/hlc/Dockerfile \
            -t microxrce-arm64 \
            --load \
            .

      # ------------------------------------------------------------
      # Extract binary from image
      # ------------------------------------------------------------
      - name: Extract binary
        run: |
          docker create --name temp microxrce-arm64
          docker cp temp:/usr/local/bin/MicroXRCEAgent ./MicroXRCEAgent || true
          docker rm temp

      # ------------------------------------------------------------
      # Prepare artifact
      # ------------------------------------------------------------
      - name: Make executable
        run: chmod +x MicroXRCEAgent

      # ------------------------------------------------------------
      # Create GitHub Release
      # ------------------------------------------------------------
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: MicroXRCEAgent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}